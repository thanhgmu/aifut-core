# ============================================================
# AIFUT Nginx Configuration — Multi-Region Reverse Proxy
# ============================================================
# This config integrates with the Cloudflare Edge Router
# (infra/edge/src/index.ts) for health-aware failover routing.
#
# Upstream zones are health-checked. The Edge Worker at
# Cloudflare layer does geo-routing; this Nginx handles
# local origin reverse proxy + cache + health probes.
#
# Environment variables (set via docker-compose):
#   NGINX_HOST       — Web UI domain (default: aifut.app)
#   NGINX_API_HOST   — API domain (default: api.aifut.app)
#   NGINX_REGION     — Region slug (vn, sg, jp, us, th)
# ============================================================

worker_processes  auto;

events {
    worker_connections  2048;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance Tuning ───────────────────────────────
    sendfile                on;
    tcp_nopush              on;
    tcp_nodelay             on;
    keepalive_timeout       65;
    keepalive_requests      1000;
    client_body_timeout     30;
    client_header_timeout   30;
    reset_timedout_connection on;
    server_tokens           off;

    # ── Proxy Cache Zone (shared with Edge Worker) ───────
    proxy_cache_path /var/cache/nginx levels=1:2
                     keys_zone=aifut_cache:10m
                     max_size=1g inactive=60m
                     use_temp_path=off;

    # ── Upstream: Web UI ─────────────────────────────────
    upstream web_backend {
        zone web_backend 64k;
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Upstream: API ────────────────────────────────────
    upstream api_backend {
        zone api_backend 64k;
        server api:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Health Check Endpoint ───────────────────────────
    # Probed by the Edge Worker (infra/edge/src/index.ts)
    # and by edge-health-probe.yml GitHub Action
    server {
        listen 8080;
        server_name localhost;

        location /__health {
            access_log off;
            default_type application/json;
            return 200 '{
                "status": "healthy",
                "region": "${NGINX_REGION:-unknown}",
                "version": "1.0.0",
                "timestamp": $msec,
                "checks": {
                    "nginx": "ok",
                    "web": "${NGINX_WEB_HEALTH:-ok}",
                    "api": "${NGINX_API_HEALTH:-ok}"
                }
            }';
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header X-Region "${NGINX_REGION:-unknown}";
        }

        location /__health/ready {
            access_log off;
            default_type application/json;
            return 200 '{"ready":true,"region":"${NGINX_REGION:-unknown}"}';
        }

        location /__health/live {
            access_log off;
            return 204;
        }

        location /nginx_status {
            stub_status;
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check on HTTP too (for load balancer probes)
        location /__health {
            proxy_pass http://127.0.0.1:8080/__health;
            access_log off;
        }
    }

    # ── Edge Worker Header Forwarding ────────────────────
    # These headers are set by the Cloudflare Edge Router
    # and forwarded to the origin for debugging/analytics.
    map $http_x_edge_region $edge_region {
        default "unknown";
        "~^." $http_x_edge_region;
    }

    # ── Web UI — aifut.app ───────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${NGINX_HOST:-aifut.app};

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Proxy to Web ─────────────────────────────────
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Real IP from Edge Worker
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Edge metadata
            proxy_set_header X-Edge-Region $edge_region;
            proxy_set_header X-Region "${NGINX_REGION:-unknown}";

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # ── Caching ──────────────────────────────────
            proxy_cache aifut_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 302 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_revalidate on;
            add_header X-Cache-Status $upstream_cache_status;

            # ── Security Headers ─────────────────────────
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        }

        # ── Static Assets (long cache) ──────────────────
        location /_next/static {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;

            proxy_cache aifut_cache;
            proxy_cache_valid 200 365d;
            proxy_cache_use_stale error timeout updating;
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /assets {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;

            proxy_cache aifut_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout updating;
            add_header Cache-Control "public, max-age=2592000";
        }
    }

    # ── API — api.aifut.app ──────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${NGINX_API_HOST:-api.aifut.app};

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Proxy to API ────────────────────────────────
        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Real IP from Edge Worker
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Edge metadata
            proxy_set_header X-Edge-Region $edge_region;
            proxy_set_header X-Region "${NGINX_REGION:-unknown}";

            # Tenant-aware routing
            proxy_set_header X-Tenant-Slug $http_x_tenant_slug;

            # Increase body size for file uploads
            client_max_body_size 100M;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # ── No caching for API (dynamic data) ────────
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store" always;

            # ── CORS Headers ─────────────────────────────
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-tenant-slug, x-edge-region" always;
            add_header Access-Control-Expose-Headers "X-Request-Id, X-Edge-Region" always;

            # ── Security Headers ─────────────────────────
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

            # ── Preflight (CORS OPTIONS) ─────────────────
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-tenant-slug, x-edge-region";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
        }

        # ── WebSocket for real-time API ──────────────────
        location /ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # ── Edge Health — Cross-region Health Check ──────────
    # Used by the Edge Router Worker to verify origin health
    server {
        listen ${NGINX_EDGE_HEALTH_PORT:-8081};
        server_name 127.0.0.1;

        location /__health {
            proxy_pass http://127.0.0.1:8080/__health;
            access_log off;
        }

        location /__health/deep {
            # Deep health check: verify internal services
            access_log off;
            default_type application/json;

            content_by_lua_block {
                local http = require("resty.http")
                local cjson = require("cjson")

                local results = {}
                local all_ok = true

                -- Check web
                local ok, err = pcall(function()
                    local res = ngx.location.capture("/_check_web")
                    results["web"] = res.status == 200 and "ok" or "degraded"
                    if results["web"] ~= "ok" then all_ok = false end
                end)
                if not ok then results["web"] = "error" all_ok = false end

                -- Check API
                local ok, err = pcall(function()
                    local res = ngx.location.capture("/_check_api")
                    results["api"] = res.status == 200 and "ok" or "degraded"
                    if results["api"] ~= "ok" then all_ok = false end
                end)
                if not ok then results["api"] = "error" all_ok = false end

                ngx.say(cjson.encode({
                    status = all_ok and "healthy" or "degraded",
                    region = os.getenv("NGINX_REGION") or "unknown",
                    checks = results
                }))
            }
        }
    }

    # ── Internal check endpoints ─────────────────────────
    server {
        listen 8082;
        server_name 127.0.0.1;

        location /_check_web {
            proxy_pass http://web_backend/__health;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }

        location /_check_api {
            proxy_pass http://api_backend/__health;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }
    }
}
