version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aifut-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-aifut}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-aifut_secret}
      POSTGRES_DB: ${PG_DB:-aifut}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-aifut}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aifut-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${PG_USER:-aifut}:${PG_PASSWORD:-aifut_secret}@postgres:5432/${PG_DB:-aifut}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_PORT: 3002
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aifut-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.aifut.app}
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    image: nginx:alpine
    container_name: aifut-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot

volumes:
  pgdata:
  api_uploads:
  certbot_data:
